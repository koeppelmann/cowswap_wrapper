<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1184" viewBox="0 0 1280 1184" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrRet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrTok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0e9f6e"/>
    </marker>
  </defs>

  <rect width="1280" height="1184" fill="#ffffff"/>
  <text x="640" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">CoWSafeWrapper — enforced Safe pre/post around a CoW settlement</text>
  <text x="640" y="56" text-anchor="middle" font-size="13" fill="#64748b">one transaction · all-or-nothing · the order is unsettleable outside this flow</text>

  <!-- ================== SETUP PANEL ================== -->
  <rect x="40" y="76" width="1200" height="152" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="100" font-size="13" font-weight="700" fill="#0f172a">SETUP (by the user, in this order)</text>
  <text x="60" y="123" font-size="12.5" fill="#334155">① Create the <tspan font-weight="600" fill="#1d4ed8">Position Safe</tspan> — owner = user (1/1) · enable <tspan font-weight="600" fill="#b45309">CoWSafeWrapper</tspan> as <tspan font-weight="600">module</tspan> · set <tspan font-weight="600" fill="#7c3aed">CoWSafeSigHandler</tspan> as <tspan font-weight="600">fallback handler</tspan> · approve <tspan font-weight="600" fill="#047857">VaultRelayer</tspan> for the sell token</text>
  <text x="60" y="146" font-size="12.5" fill="#334155">② Generate a fresh <tspan font-family="ui-monospace,Menlo,monospace" font-size="12">nonce</tspan> for the action</text>
  <text x="60" y="169" font-size="12.5" fill="#334155">③ Build the CoW order — its <tspan font-weight="600">appData embeds {wrapper, safe, nonce, PRE tx, POST tx}</tspan> → the resulting <tspan font-family="ui-monospace,Menlo,monospace" font-size="12">uid</tspan> commits to all of it</text>
  <text x="60" y="192" font-size="12.5" fill="#334155">④ Safe calls <tspan font-family="ui-monospace,Menlo,monospace" font-size="12">registerMetaOrder(nonce, {uid, expectedFill, preHash, postHash, notBefore, deadline})</tspan> — a direct Safe call (not spoofable via fallback)</text>
  <text x="60" y="215" font-size="12.5" fill="#64748b">Mutual binding: the uid commits to the appData (nonce + payloads); the registration commits to the uid + payload hashes. Solvers read the appData to execute — never invent or alter.</text>

  <g transform="translate(0,34)">
  <!-- ================== ACTORS ================== -->
  <!-- lifeline x positions -->
  <!-- Solver 110 | Wrapper 330 | Safe 590 | Handler 800 | Settlement 1000 | VaultRelayer 1185 -->
  <g font-size="13" font-weight="700" text-anchor="middle">
    <rect x="45"  y="218" width="130" height="46" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="110" y="238" fill="#92400e">Solver</text>
    <text x="110" y="254" font-size="10.5" font-weight="400" fill="#92400e">allowlisted bot</text>

    <rect x="248" y="218" width="164" height="46" rx="10" fill="#ffedd5" stroke="#ea580c"/>
    <text x="330" y="238" fill="#9a3412">CoWSafeWrapper</text>
    <text x="330" y="254" font-size="10.5" font-weight="400" fill="#9a3412">allowlisted solver · Safe module</text>

    <rect x="512" y="218" width="156" height="46" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="590" y="238" fill="#1e40af">Position Safe</text>
    <text x="590" y="254" font-size="10.5" font-weight="400" fill="#1e40af">Gnosis Safe v1.3.0</text>

    <rect x="722" y="218" width="156" height="46" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="800" y="238" fill="#5b21b6">CoWSafeSigHandler</text>
    <text x="800" y="254" font-size="10.5" font-weight="400" fill="#5b21b6">Safe fallback handler</text>

    <rect x="922" y="218" width="156" height="46" rx="10" fill="#d1fae5" stroke="#059669"/>
    <text x="1000" y="238" fill="#065f46">GPv2Settlement</text>
    <text x="1000" y="254" font-size="10.5" font-weight="400" fill="#065f46">CoW Protocol</text>

    <rect x="1112" y="218" width="146" height="46" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="1185" y="238" fill="#065f46">VaultRelayer</text>
    <text x="1185" y="254" font-size="10.5" font-weight="400" fill="#065f46">pulls sell tokens</text>
  </g>

  <!-- lifelines -->
  <g stroke="#cbd5e1" stroke-dasharray="4 4">
    <line x1="110"  y1="264" x2="110"  y2="1028"/>
    <line x1="330"  y1="264" x2="330"  y2="1028"/>
    <line x1="590"  y1="264" x2="590"  y2="1028"/>
    <line x1="800"  y1="264" x2="800"  y2="1028"/>
    <line x1="1000" y1="264" x2="1000" y2="1028"/>
    <line x1="1185" y1="264" x2="1185" y2="1028"/>
  </g>

  <!-- activation bars -->
  <rect x="324" y="296" width="12" height="690" fill="#fdba74" opacity="0.55" rx="3"/>
  <rect x="994" y="498" width="12" height="330" fill="#6ee7b7" opacity="0.55" rx="3"/>

  <!-- ================== SEQUENCE ================== -->
  <g font-size="12.5" fill="#0f172a">

    <!-- 1 solver -> wrapper -->
    <line x1="110" y1="306" x2="322" y2="306" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="120" y="298"><tspan font-weight="700">1</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">wrappedSettle(settleData, [{safe, nonce, pre, post}])</tspan></text>
    <text x="120" y="322" font-size="11" fill="#64748b">base CowWrapper checks isSolver(solver) on CoW's allowlist</text>

    <!-- 2 wrapper self: verify + freeze -->
    <path d="M 336 352 h 64 v 26 h -64" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="410" y="362"><tspan font-weight="700">2</tspan>  verify <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">keccak(pre) == preHash · keccak(post) == postHash</tspan></text>
    <text x="410" y="378" font-size="11.5" fill="#334155">require <tspan font-family="ui-monospace,Menlo,monospace" font-size="11">filledAmount(uid) == 0</tspan> <tspan fill="#64748b" font-size="11">(read from Settlement)</tspan> · freeze registration (status → consumed) · snapshot</text>

    <!-- 3 wrapper -> safe PRE -->
    <line x1="336" y1="416" x2="582" y2="416" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="346" y="408"><tspan font-weight="700">3</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">execTransactionFromModule(PRE)</tspan></text>
    <text x="346" y="432" font-size="11" fill="#64748b">the PRE tx runs AS the Safe — e.g. approvals, repay + withdraw (single call or MultiSend batch)</text>

    <!-- 4 wrapper self: bless -->
    <path d="M 336 462 h 64 v 26 h -64" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="410" y="472"><tspan font-weight="700">4</tspan>  set transient <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">BLESS(epoch, safe, orderDigest)</tspan> — minimal window opens</text>

    <!-- 5 wrapper -> settlement -->
    <line x1="336" y1="510" x2="992" y2="510" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="346" y="502"><tspan font-weight="700">5</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">settle(settleData)</tspan>   <tspan fill="#64748b" font-size="11">— settlement checks isSolver(CoWSafeWrapper)</tspan></text>

    <!-- 6 settlement -> safe staticcall -->
    <line x1="994" y1="556" x2="598" y2="556" stroke="#334155" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arr)"/>
    <text x="640" y="548"><tspan font-weight="700">6</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">isValidSignature(orderDigest, sig)</tspan> <tspan fill="#64748b" font-size="11">STATICCALL</tspan></text>

    <!-- 7 safe -> handler fallback -->
    <line x1="598" y1="596" x2="792" y2="596" stroke="#334155" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arr)"/>
    <text x="608" y="588"><tspan font-weight="700">7</tspan>  fallback forwards <tspan fill="#64748b" font-size="11">(+ appends caller = Settlement)</tspan></text>

    <!-- 8 handler -> wrapper isBlessed -->
    <line x1="792" y1="636" x2="338" y2="636" stroke="#334155" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arr)"/>
    <text x="430" y="628"><tspan font-weight="700">8</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">isBlessed(safe, digest)</tspan> → true   <tspan fill="#64748b" font-size="11">(only during step 4–11)</tspan></text>

    <!-- 8b return magic -->
    <line x1="800" y1="668" x2="992" y2="668" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arrRet)"/>
    <text x="810" y="660" fill="#475569"><tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">0x1626ba7e</tspan> — order is valid</text>

    <!-- 9 settlement -> vaultrelayer -->
    <line x1="1006" y1="712" x2="1177" y2="712" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="1012" y="704"><tspan font-weight="700">9</tspan>  pull sell token</text>

    <!-- 10 vaultrelayer -> safe transferFrom -->
    <line x1="1177" y1="752" x2="598" y2="752" stroke="#0e9f6e" stroke-width="1.8" marker-end="url(#arrTok)"/>
    <text x="650" y="744" fill="#065f46"><tspan font-weight="700">10</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">sellToken.transferFrom(Safe → Settlement)</tspan> <tspan font-size="11">(uses the Safe's approval)</tspan></text>

    <!-- 11 settlement -> safe payout -->
    <line x1="994" y1="792" x2="598" y2="792" stroke="#0e9f6e" stroke-width="1.8" marker-end="url(#arrTok)"/>
    <text x="640" y="784" fill="#065f46"><tspan font-weight="700">11</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">buyToken.transfer(→ Safe)</tspan> — clearing payout at ≥ the order's limit price</text>

    <!-- 12 wrapper -> settlement: explicit fill-proof read -->
    <line x1="336" y1="838" x2="992" y2="838" stroke="#334155" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arr)"/>
    <text x="346" y="830"><tspan font-weight="700">12</tspan>  close bless window · <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">filledAmount(uid)</tspan> <tspan fill="#64748b" font-size="11">STATICCALL — the settlement's fill accounting is the source of truth</tspan></text>
    <line x1="992" y1="866" x2="338" y2="866" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arrRet)"/>
    <text x="346" y="880" fill="#0f172a">require <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">filledAmount ≥ expectedFill</tspan> <tspan fill="#64748b" font-size="11">— a solver that ran PRE but skipped the trade reverts everything here</tspan></text>

    <!-- 13 wrapper -> safe POST -->
    <line x1="336" y1="902" x2="582" y2="902" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="346" y="894"><tspan font-weight="700">13</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">execTransactionFromModule(POST)</tspan></text>
    <text x="346" y="918" font-size="11" fill="#64748b">the POST tx runs AS the Safe — e.g. supply proceeds, forward funds (hash-committed, unblessed)</text>

    <!-- 14 return -->
    <line x1="322" y1="958" x2="110" y2="958" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arrRet)"/>
    <text x="130" y="950" fill="#475569"><tspan font-weight="700">14</tspan>  magic value — bundle fully enforced ✓</text>
  </g>

  <!-- ================== FOOTER NOTES ================== -->
  <rect x="40" y="1044" width="1200" height="86" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <g font-size="12" fill="#334155">
    <text x="60" y="1068"><tspan font-weight="700" fill="#0f172a">All-or-nothing:</tspan> any failure — hash mismatch, PRE revert, signature invalid, unfilled order, POST revert — reverts the ENTIRE transaction. No partial state ever.</text>
    <text x="60" y="1090"><tspan font-weight="700" fill="#0f172a">No bypass:</tspan> outside steps 4–11 <tspan font-family="ui-monospace,Menlo,monospace" font-size="11">isBlessed</tspan> is false, so the order can never be settled directly — pre/post cannot be skipped.</text>
    <text x="60" y="1112"><tspan font-weight="700" fill="#0f172a">Roles:</tspan> the wrapper is a <tspan font-style="italic">module</tspan> on the Safe (acts as it, steps 3/13) and an <tspan font-style="italic">allowlisted solver</tspan> toward the settlement (step 5); the handler only answers EIP-1271 (steps 7–8).</text>
  </g>
  </g>
</svg>
