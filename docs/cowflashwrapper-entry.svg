<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1120" viewBox="0 0 1280 1120" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrRet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrTok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0e9f6e"/>
    </marker>
  </defs>

  <rect width="1280" height="1120" fill="#ffffff"/>
  <text x="640" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">CowFlashLoanWrapper — the solver's entry tx, up to the inner-wrapper handoff</text>
  <text x="640" y="56" text-anchor="middle" font-size="13" fill="#64748b">one transaction · the flash loan wraps the entire chain · continues in the CoWSafeWrapper diagram at step 8</text>

  <!-- ================== CALLDATA PANEL ================== -->
  <rect x="40" y="76" width="1200" height="128" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="100" font-size="13" font-weight="700" fill="#0f172a">THE SOLVER'S SINGLE TRANSACTION — entry point &amp; calldata layout</text>
  <text x="60" y="124" font-family="ui-monospace,Menlo,monospace" font-size="12.5" fill="#9a3412">CowFlashLoanWrapper.wrappedSettle( settleData, chainedWrapperData )</text>
  <text x="84" y="147" font-size="12" fill="#334155"><tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#065f46">settleData</tspan> = the full ABI-encoded <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">GPv2Settlement.settle(tokens, prices, trades, interactions)</tspan> — forwarded verbatim, never modified</text>
  <text x="84" y="170" font-size="12" fill="#334155"><tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#9a3412">chainedWrapperData</tspan> = <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">[uint16 lenA][abi.encode(Loan[]{token, amount, recipient})]</tspan> <tspan fill="#64748b">← this wrapper's slice</tspan></text>
  <text x="84" y="192" font-size="12" fill="#334155"><tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;++ [20B addr CoWSafeWrapper][uint16 lenB][abi.encode(OrderExec[]{safe, nonce, pre, post})]</tspan> <tspan fill="#64748b">← the inner wrapper's slice</tspan></text>

  <!-- ================== ACTORS ================== -->
  <!-- Solver 110 | FlashWrapper 370 | AavePool 660 | Safe 900 | CoWSafeWrapper 1120 -->
  <g font-size="13" font-weight="700" text-anchor="middle">
    <rect x="45"  y="228" width="130" height="46" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="110" y="248" fill="#92400e">Solver</text>
    <text x="110" y="264" font-size="10.5" font-weight="400" fill="#92400e">allowlisted bot</text>

    <rect x="278" y="228" width="184" height="46" rx="10" fill="#ffedd5" stroke="#ea580c"/>
    <text x="370" y="248" fill="#9a3412">CowFlashLoanWrapper</text>
    <text x="370" y="264" font-size="10.5" font-weight="400" fill="#9a3412">stateless · allowlisted solver</text>

    <rect x="582" y="228" width="156" height="46" rx="10" fill="#fce7f3" stroke="#db2777"/>
    <text x="660" y="248" fill="#9d174d">Aave V3 Pool</text>
    <text x="660" y="264" font-size="10.5" font-weight="400" fill="#9d174d">flash-loan lender</text>

    <rect x="822" y="228" width="156" height="46" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="900" y="248" fill="#1e40af">Position Safe</text>
    <text x="900" y="264" font-size="10.5" font-weight="400" fill="#1e40af">loan recipient</text>

    <rect x="1042" y="228" width="166" height="46" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="5 3"/>
    <text x="1125" y="248" fill="#475569">CoWSafeWrapper</text>
    <text x="1125" y="264" font-size="10.5" font-weight="400" fill="#475569">→ previous diagram</text>
  </g>

  <!-- lifelines -->
  <g stroke="#cbd5e1" stroke-dasharray="4 4">
    <line x1="110"  y1="274" x2="110"  y2="990"/>
    <line x1="370"  y1="274" x2="370"  y2="990"/>
    <line x1="660"  y1="274" x2="660"  y2="990"/>
    <line x1="900"  y1="274" x2="900"  y2="990"/>
    <line x1="1125" y1="274" x2="1125" y2="990"/>
  </g>

  <!-- activation bars -->
  <rect x="364" y="306" width="12" height="630" fill="#fdba74" opacity="0.55" rx="3"/>
  <rect x="654" y="438" width="12" height="430" fill="#f9a8d4" opacity="0.55" rx="3"/>

  <g font-size="12.5" fill="#0f172a">

    <!-- 1 solver -> flashwrapper -->
    <line x1="110" y1="316" x2="362" y2="316" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="120" y="308"><tspan font-weight="700">1</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">wrappedSettle(settleData, chainedWrapperData)</tspan></text>
    <text x="120" y="332" font-size="11" fill="#64748b">base CowWrapper: require isSolver(solver) on CoW's allowlist</text>

    <!-- 2 self: parse chain -->
    <path d="M 376 360 h 64 v 26 h -64" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="450" y="370"><tspan font-weight="700">2</tspan>  base slices the chain: this wrapper's data = <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">Loan[]</tspan> · remaining = <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">[CoWSafeWrapper ++ OrderExec[]]</tspan></text>
    <text x="450" y="386" font-size="11.5" fill="#334155">_wrap: decode loans (≤8, no dup tokens) · commit <tspan font-family="ui-monospace,Menlo,monospace" font-size="11">T_COMMIT := keccak(ctx)</tspan> · <tspan font-family="ui-monospace,Menlo,monospace" font-size="11">T_FL := 1</tspan></text>

    <!-- 3 flashwrapper -> pool flashLoan -->
    <line x1="376" y1="430" x2="652" y2="430" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="386" y="422"><tspan font-weight="700">3</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">flashLoan(receiver=this, [WXDAI], [200], modes=0, params)</tspan></text>
    <text x="386" y="446" font-size="11" fill="#64748b">params = FlashCtx{ settleData, remaining, assets, amounts, recipients } — the continuation, hash-committed (trampoline)</text>

    <!-- 4 pool -> wrapper: loan tokens -->
    <line x1="652" y1="490" x2="378" y2="490" stroke="#0e9f6e" stroke-width="1.8" marker-end="url(#arrTok)"/>
    <text x="420" y="482" fill="#065f46"><tspan font-weight="700">4</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">WXDAI.transfer(→ wrapper, 200)</tspan> — the loan arrives</text>

    <!-- 5 pool -> wrapper executeOperation -->
    <line x1="652" y1="538" x2="378" y2="538" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="395" y="530"><tspan font-weight="700">5</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">executeOperation(assets, amounts, premiums, initiator, params)</tspan></text>
    <text x="395" y="554" font-size="11" fill="#64748b">gates: msg.sender == POOL · initiator == this · T_FL == 1 · keccak(params) == T_COMMIT (ParamsTampered)</text>

    <!-- 6 wrapper -> safe: deliver loan -->
    <line x1="378" y1="600" x2="892" y2="600" stroke="#0e9f6e" stroke-width="1.8" marker-end="url(#arrTok)"/>
    <text x="500" y="592" fill="#065f46"><tspan font-weight="700">6</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">WXDAI.transfer(→ Safe, 200)</tspan> — deliver to each Loan.recipient</text>

    <!-- 7 handoff to inner wrapper -->
    <line x1="378" y1="660" x2="1117" y2="660" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <text x="430" y="652"><tspan font-weight="700">7</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">_nextMem → CoWSafeWrapper.wrappedSettle(settleData, OrderExec[] slice)</tspan></text>
    <text x="430" y="676" font-size="11" fill="#64748b">first 20 bytes of `remaining` name the next wrapper; the rest is its data — settleData passes through untouched</text>

    <!-- handoff box -->
    <rect x="1040" y="690" width="170" height="84" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="5 3"/>
    <text x="1125" y="710" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">HANDOFF</text>
    <text x="1125" y="726" text-anchor="middle" font-size="10.5" fill="#475569">verify pre/post hashes</text>
    <text x="1125" y="740" text-anchor="middle" font-size="10.5" fill="#475569">PRE → bless → settle →</text>
    <text x="1125" y="754" text-anchor="middle" font-size="10.5" fill="#475569">fill-check → POST</text>
    <text x="1125" y="768" text-anchor="middle" font-size="10.5" fill="#475569">(previous diagram, 1–14)</text>

    <!-- 8 inner returns -->
    <line x1="1117" y1="800" x2="378" y2="800" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arrRet)"/>
    <text x="430" y="792" fill="#475569"><tspan font-weight="700">8</tspan>  magic value — inner bundle fully enforced; the Safe's POST routed <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">200.1</tspan> back to the flash wrapper</text>

    <!-- 9 repay check + approve -->
    <path d="M 376 836 h 64 v 26 h -64" fill="none" stroke="#334155" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="450" y="846"><tspan font-weight="700">9</tspan>  require <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">balance ≥ 200.1</tspan> · <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">forceApprove(POOL, 200.1)</tspan> (OZ SafeERC20) · return true</text>

    <!-- 10 pool pulls -->
    <line x1="378" y1="892" x2="652" y2="892" stroke="#0e9f6e" stroke-width="1.8" marker-end="url(#arrTok)"/>
    <text x="400" y="884" fill="#065f46"><tspan font-weight="700">10</tspan>  Aave pulls <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">200 + 0.1 premium</tspan> via the allowance — loan closed</text>

    <!-- 11 return to solver -->
    <line x1="362" y1="944" x2="110" y2="944" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arrRet)"/>
    <text x="130" y="936" fill="#475569"><tspan font-weight="700">11</tspan>  <tspan font-family="ui-monospace,Menlo,monospace" font-size="11.5">T_FL := 0</tspan> · magic value — whole stack succeeded ✓</text>
  </g>

  <!-- ================== FOOTER ================== -->
  <rect x="40" y="1006" width="1200" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <g font-size="12" fill="#334155">
    <text x="60" y="1030"><tspan font-weight="700" fill="#0f172a">The loan window:</tspan> steps 5–9 are ONE call frame — the entire inner settlement (pre, swap, fill-check, post) executes while the wrapper holds Aave's loan. That is the whole point.</text>
    <text x="60" y="1052"><tspan font-weight="700" fill="#0f172a">No registry, no owner:</tspan> the Loan[] is solver-chosen and unauthorized BY DESIGN — a wrong loan simply isn't repaid in step 9/10 and the entire transaction reverts. Atomic repayment IS the security.</text>
    <text x="60" y="1074"><tspan font-weight="700" fill="#0f172a">Two allowlist entries:</tspan> the settlement checks isSolver(CoWSafeWrapper); this wrapper checks isSolver(solver); CoWSafeWrapper checks isSolver(CowFlashLoanWrapper) — every hop is gated by CoW's own allowlist.</text>
  </g>
</svg>
