name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge build
        run: forge build --sizes
      - name: forge test (fork; runs only if a Gnosis RPC secret is configured)
        env:
          GNOSIS_RPC: ${{ secrets.GNOSIS_RPC }}
        run: if [ -n "$GNOSIS_RPC" ]; then forge test -vv; else echo "no GNOSIS_RPC secret — skipping fork tests"; fi
